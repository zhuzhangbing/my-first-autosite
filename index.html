<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>我的第一个自动化网页</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f0f0; }
        h1 { color: #2c3e50; }
        .box { background: white; padding: 30px; border-radius: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎉 成功了！</h1>
        <p>这是通过 GitHub Actions 自动部署上线的。</p>
        <p id="time"></p>
    </div>
    <script>
        document.getElementById('time').innerText = '部署时间：' + new Date().toLocaleString();
    </script>
</body>
</html>
